name: memo_app
description: "记途 - 离线备忘录"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.4.0

  # 本地数据库
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0

  # 本地存储
  shared_preferences: ^2.2.0

  # 富文本编辑
  flutter_quill: ^9.0.0

  # 布局
  flutter_staggered_grid_view: ^0.7.0
  fl_chart: ^0.66.0

  # 文件与路径
  path_provider: ^2.1.0
  file_picker: ^6.0.0
  image_picker: ^1.0.0
  share_plus: ^7.0.0

  # 通知
  flutter_local_notifications: ^16.0.0

  # 音效
  audioplayers: ^5.0.0

  # 工具
  path: ^1.8.0
  uuid: ^4.0.0
  intl: ^0.20.2
  encrypt: ^5.0.0
  csv: ^5.1.0
  permission_handler: ^11.0.0
  package_info_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
